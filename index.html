<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a1628">
<title>🇰🇷 대한민국 32강 시뮬레이터</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#0a1628;color:#e8edf5;font-family:'Noto Sans KR',sans-serif;padding:16px}
.w{max-width:600px;margin:0 auto}
.hd{text-align:center;margin-bottom:18px}
.hd h1{font-size:clamp(18px,5vw,24px);font-weight:900;margin-bottom:4px}
.hd .r{color:#e63946}.hd .b{color:#3a86ff}
.hd .sub{font-size:11px;color:#889}
.sb{background:#111d30;border:1px solid #1e3050;border-radius:10px;padding:10px 14px;display:inline-flex;align-items:center;gap:10px;margin:10px 0}
.sb .f{font-size:28px}.sb .p{font-size:13px;font-weight:900;color:#e63946}.sb .s{font-size:10px;color:#889}
.kp{background:linear-gradient(135deg,#e63946,#c1121f);border-radius:10px;padding:10px 14px;text-align:center;font-size:12px;font-weight:700;line-height:1.5;margin-bottom:16px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:clamp(17px,4.5vw,21px);font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:linear-gradient(135deg,#e63946,#ff6b6b);color:#fff;box-shadow:0 4px 20px rgba(230,57,70,.4);transition:all .15s;margin-bottom:16px;letter-spacing:1px}
.btn:active{transform:scale(.96)}.btn.off{background:#444;pointer-events:none}
.sec{font-size:13px;font-weight:800;color:#667;margin:14px 0 8px;padding-left:4px}
.gr{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.gm{background:#111d30;border:1px solid #1e3050;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:11px;transition:all .3s}
.gm.ok{border-color:#22c55e;background:#0d2818}.gm.no{border-color:#333;opacity:.5}
.gm .gb{min-width:36px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;background:#1e3050;color:#6ea8ff;flex-shrink:0}
.gm.ok .gb{background:#14532d;color:#4ade80}.gm.no .gb{background:#1a1a2e;color:#555}
.gm .d{flex:1;font-weight:600;color:#b0bfcf;word-break:keep-all}
.gm.ok .d{color:#86efac}.gm.no .d{color:#666}
.gm .ic{flex-shrink:0;font-size:14px}
.tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px}
.tbl th{background:#111d30;color:#889;padding:6px 4px;text-align:center;font-weight:700;border-bottom:1px solid #1e3050}
.tbl td{padding:5px 4px;text-align:center;border-bottom:1px solid #111d30}
.tbl tr.me{background:#1a2a10;font-weight:900;color:#fbbf24}
.tbl tr.in{color:#4ade80}.tbl tr.out{color:#555}
.tbl .tm{text-align:left;padding-left:8px}
.rb{text-align:center;padding:20px 16px;display:none;animation:fu .5s ease}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rb.v{display:block}
.rb img{width:min(200px,50vw);border-radius:12px;margin-bottom:12px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.rb .msg{font-size:clamp(22px,6vw,30px);font-weight:900;margin-bottom:4px}
.rb .msg.w{color:#fbbf24;text-shadow:0 2px 10px rgba(251,191,36,.4)}
.rb .msg.l{color:#888}
.rb .ct{font-size:12px;color:#889}
.shb{text-align:center;margin-top:14px;display:none}
.shb canvas{width:100%;max-width:320px;border-radius:10px;border:1px solid #1e3050;margin-bottom:8px}
.shb button{padding:10px 20px;border:1px solid #2a3a50;border-radius:8px;background:#111d30;color:#889;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.ft{text-align:center;font-size:9px;color:#334;margin-top:16px;padding-top:12px;border-top:1px solid #141e30;line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#22c55e;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:99}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

/* ══════ SCORE GENERATION ══════ */
var SCORES_W=[[1,0,.30],[2,0,.20],[2,1,.25],[3,0,.08],[3,1,.12],[4,1,.05]];
var SCORES_D=[[0,0,.35],[1,1,.40],[2,2,.18],[3,3,.07]];
function genScore(r){
  var pool=r===0?SCORES_W:SCORES_D;
  var rnd=Math.random(),cum=0;
  for(var i=0;i<pool.length;i++){cum+=pool[i][2];if(rnd<cum)return[pool[i][0],pool[i][1]];}
  return[pool[0][0],pool[0][1]];
}
function simMatch(pW,pD,pL){
  var r=Math.random(),s;
  if(r<pW){s=genScore(0);return[s[0],s[1]];}
  if(r<pW+pD){s=genScore(1);return[s[0],s[1]];}
  s=genScore(0);return[s[1],s[0]];
}

/* ══════ SIMULATE ALL GROUPS ══════ */
function simAll(){
  var thirds=[];
  var matchLog=[];
  // Add completed groups
  DONE.forEach(function(g){thirds.push({grp:g.grp,team:g.third.team,pts:g.third.pts,gd:g.third.gd,gf:g.third.gf,done:true});});
  // Simulate remaining
  SIMS.forEach(function(g){
    var st=g.standings.map(function(t){return{team:t.team,pts:t.pts,gf:t.gf,ga:t.ga};});
    var grpMatches=[];
    g.matches.forEach(function(m){
      var ai=m[0],bi=m[1],pW=m[2],pD=m[3],pL=m[4];
      var sc=simMatch(pW,pD,pL);
      st[ai].gf+=sc[0];st[ai].ga+=sc[1];
      st[bi].gf+=sc[1];st[bi].ga+=sc[0];
      if(sc[0]>sc[1]){st[ai].pts+=3;}
      else if(sc[0]===sc[1]){st[ai].pts+=1;st[bi].pts+=1;}
      else{st[bi].pts+=3;}
      grpMatches.push({a:st[ai].team,b:st[bi].team,sa:sc[0],sb:sc[1]});
    });
    // Sort by pts > gd > gf
    st.sort(function(a,b){
      var da=(a.gf-a.ga),db=(b.gf-b.ga);
      return(b.pts-a.pts)||(db-da)||(b.gf-a.gf);
    });
    var t=st[2]; // 3rd place
    thirds.push({grp:g.grp,team:t.team,pts:t.pts,gd:t.gf-t.ga,gf:t.gf,done:false});
    matchLog.push({grp:g.grp,matches:grpMatches});
  });
  // Sort thirds
  thirds.sort(function(a,b){return(b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);});
  return{thirds:thirds,log:matchLog};
}

/* ══════ RENDER ══════ */
var lastThirds=null,lastRank=0;
async function run(){
  var btn=document.getElementById('go');
  btn.classList.add('off');btn.textContent='⏳ 시뮬레이션 중...';
  document.getElementById('rb').className='rb';
  document.getElementById('shb').style.display='none';
  document.getElementById('tblTitle').style.display='none';
  document.getElementById('rankTbl').style.display='none';
  var ma=document.getElementById('matchArea');ma.innerHTML='';

  await delay(300);
  var res=simAll();
  lastThirds=res.thirds;

  // Show match results
  var html='<div class="sec">⚽ 매치데이 3 시뮬레이션 결과</div><div class="gr">';
  res.log.forEach(function(g){
    g.matches.forEach(function(m){
      var ok=true; // just show all
      html+='<div class="gm ok"><div class="gb">'+g.grp+'</div><div class="d">'+
        stripFlag(m.a)+' '+m.sa+' : '+m.sb+' '+stripFlag(m.b)+'</div><div class="ic">⚽</div></div>';
    });
  });
  html+='</div>';
  ma.innerHTML=html;

  await delay(500);

  // Show ranking table
  var koreaRank=0;
  document.getElementById('tblTitle').style.display='block';
  document.getElementById('rankTbl').style.display='table';
  var tb=document.getElementById('rankBody');tb.innerHTML='';
  res.thirds.forEach(function(t,i){
    var isKorea=t.team.indexOf('한국')>=0;
    if(isKorea)koreaRank=i+1;
    var cls=isKorea?'me':(i<8?'in':'out');
    var tag=i<8?'✅':'❌';
    tb.innerHTML+='<tr class="'+cls+'"><td>'+(i+1)+'</td><td class="tm">'+t.grp+'</td><td class="tm">'+t.team+'</td><td>'+t.pts+'</td><td>'+(t.gd>0?'+':'')+t.gd+'</td><td>'+t.gf+'</td><td>'+tag+'</td></tr>';
    if(i===7)tb.innerHTML+='<tr><td colspan="7" style="background:#e63946;height:2px;padding:0"></td></tr>';
  });
  lastRank=koreaRank;

  await delay(400);

  // Result
  var rb=document.getElementById('rb');
  var win=koreaRank<=8;
  if(win){
    rb.innerHTML='<img src="'+IH+'"><div class="msg w">역시 홍버지! 32강 진출!</div><div class="ct">3위 팀 중 '+koreaRank+'위 — '+(koreaRank<=4?'여유있게 통과!':'아슬아슬 통과!')+'</div>';
  }else{
    rb.innerHTML='<img src="'+IS+'"><div class="msg l">멸 망</div><div class="ct">3위 팀 중 '+koreaRank+'위 — 컷 오프 라인 밖...</div>';
  }
  rb.className='rb v';
  document.getElementById('shb').style.display='block';
  drawCard();
  rb.scrollIntoView({behavior:'smooth',block:'center'});

  btn.classList.remove('off');btn.textContent='🔥 다시 가즈아 🔥';
}

function stripFlag(s){return s.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]\u200D?[\uD800-\uDBFF]?[\uDC00-\uDFFF]?/g,'').replace(/[\uD83C][\uDDE6-\uDDFF][\uD83C][\uDDE6-\uDDFF]/g,'').replace(/🏴[\u200D\uDB40-\uDBFF\uDC00-\uDFFF]*/g,'').trim();}

/* ══════ CANVAS CARD ══════ */
function drawCard(){
  var win=lastRank<=8;
  var img=new Image();
  img.onload=function(){
    var c=document.getElementById('cv');
    var W=640,H=180+lastThirds.length*38+80,dpr=2;
    c.width=W*dpr;c.height=H*dpr;c.style.maxWidth=W/2+'px';
    var x=c.getContext('2d');x.scale(dpr,dpr);
    x.fillStyle='#0a1628';x.fillRect(0,0,W,H);
    // Header
    x.fillStyle=win?'#14532d':'#2a1020';rr(x,0,0,W,150);
    // Photo
    x.save();x.beginPath();x.arc(W/2,55,45,0,Math.PI*2);x.clip();
    x.drawImage(img,W/2-45,10,90,90);x.restore();
    x.strokeStyle=win?'#fbbf24':'#555';x.lineWidth=2;
    x.beginPath();x.arc(W/2,55,45,0,Math.PI*2);x.stroke();
    // Text
    x.textAlign='center';
    x.font='bold 24px -apple-system,"Malgun Gothic",sans-serif';
    x.fillStyle=win?'#fbbf24':'#888';
    x.fillText(win?'역시 홍버지! 32강 진출!':'멸 망',W/2,125);
    x.font='bold 12px -apple-system,"Malgun Gothic",sans-serif';
    x.fillStyle='#aab';
    x.fillText('3위 팀 중 '+lastRank+'위 | 대한민국 32강 시뮬레이터',W/2,145);
    // Table
    var ty=165;
    x.font='bold 10px -apple-system,sans-serif';
    x.fillStyle='#556';x.textAlign='left';
    x.fillText('#',25,ty);x.fillText('조',50,ty);x.fillText('팀',80,ty);
    x.textAlign='center';x.fillText('승점',420,ty);x.fillText('득실',480,ty);x.fillText('득점',540,ty);x.fillText('',590,ty);
    ty+=5;
    lastThirds.forEach(function(t,i){
      var y=ty+i*38;
      var isK=t.team.indexOf('한국')>=0;
      var isIn=i<8;
      if(i===8){x.fillStyle='#e63946';x.fillRect(20,y-2,W-40,2);}
      x.globalAlpha=isK?1:(isIn?0.9:0.4);
      x.fillStyle=isK?'#1a2a10':(i%2===0?'#0c1424':'#0a1628');
      rr(x,20,y,W-40,34);
      x.font=isK?'bold 12px -apple-system,"Malgun Gothic",sans-serif':'600 11px -apple-system,"Malgun Gothic",sans-serif';
      x.fillStyle=isK?'#fbbf24':(isIn?'#ccd':'#556');
      x.textAlign='left';
      x.fillText(i+1,30,y+22);
      x.fillText(t.grp,55,y+22);
      x.fillText(stripFlag(t.team),85,y+22);
      x.textAlign='center';
      x.fillText(t.pts,420,y+22);
      x.fillText((t.gd>0?'+':'')+t.gd,480,y+22);
      x.fillText(t.gf,540,y+22);
      x.fillText(isIn?'O':'X',590,y+22);
      x.globalAlpha=1;
    });
    // Footer
    var fy=ty+lastThirds.length*38+10;
    x.fillStyle='#111d30';rr(x,20,fy,W-40,30);
    x.font='600 11px -apple-system,"Malgun Gothic",sans-serif';
    x.fillStyle='#556';x.textAlign='center';
    x.fillText('dirpro87.github.io/Hong-Simul',W/2,fy+20);
  };
  img.src=win?IH:IS;
}
function dl(){
  var c=document.getElementById('cv');
  var u=c.toDataURL('image/png');
  var p=u.split(','),r=atob(p[1]),a=new Uint8Array(r.length);
  for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);
  var b=new Blob([a],{type:'image/png'});
  var l=document.createElement('a');l.href=URL.createObjectURL(b);
  l.download='worldcup-result.png';document.body.appendChild(l);l.click();
  document.body.removeChild(l);
  var t=document.getElementById('toast');t.textContent='이미지 저장 완료!';t.classList.add('on');
  setTimeout(function(){t.classList.remove('on')},2000);
}
function rr(c,x,y,w,h){c.beginPath();var r=6;c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.fill();}
function delay(ms){return new Promise(function(r){setTimeout(r,ms)})}
